<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Anti-gravity D-DAY 카운터</title>
    <meta name="description" content="미니멀하고 세련된 무중력 D-DAY 카운터입니다. 우주 공간처럼 둥둥 떠다니는 태그와 함께 당신만의 디데이를 설정해보세요.">
    <meta name="keywords" content="디데이, D-DAY, 카운터, 타이머, 무중력 타이머, 미니멀 디자인, dday timer">
    <meta name="author" content="VibeCoding">
    <link rel="canonical" href="https://d-day-timer.vercel.app/">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (카카오톡, 슬랙 등 공유 시 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://d-day-timer.vercel.app/">
    <meta property="og:title" content="Anti-gravity D-DAY 카운터">
    <meta property="og:description" content="우주 공간처럼 둥둥 떠다니는 태그와 함께 당신만의 디데이를 설정해보세요.">
    <meta property="og:site_name" content="D-DAY 카운터">
    <!-- 모던한 UI를 위한 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* 이미지와 같은 솔리드 다크 테마 배경 */
            background: #111;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        /* 🚀 물리 엔진이 적용될 DOM 요소들의 공통 클래스 */
        .physics-element {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            will-change: transform; /* 퍼포먼스 최적화 */
            transform-origin: center center;
            user-select: none; /* 드래그 시 텍스트 선택 방지 */
            cursor: grab;
        }
        
        .physics-element:active {
            cursor: grabbing;
        }

        /* 🎨 개별 UI 스타일링 */
        .top-nav {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        .top-nav svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }

        #subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #aaa;
            white-space: nowrap;
        }

        /* 기존의 인풋 폼은 기능 유지를 위해 렌더링하되 미니멀하게 숨겨둡니다 */
        #input-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            opacity: 0; /* 평소엔 안보이게 숨김 처리 */
            transition: opacity 0.3s;
        }
        
        #input-container:hover {
            opacity: 1; /* 우측 상단에 마우스를 올리면 표시 */
        }

        input[type="date"] {
            padding: 10px 15px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            border: 1px solid #333;
            border-radius: 10px;
            outline: none;
            background: #222;
            color: #fff;
            cursor: pointer;
            color-scheme: dark;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            background: #333;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #555;
        }

        #dday-display {
            font-size: 10rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -3px;
            white-space: nowrap;
        }
        
        .pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            color: #ddd;
            font-weight: 600;
            backdrop-filter: blur(5px);
        }

        .instruction {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 좌상단 고정 아이콘 (물리 효과 제외) -->
    <div class="top-nav">
        <!-- 알림 아이콘 -->
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <!-- 유저 아이콘 -->
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>

    <!-- 우측 상단으로 숨긴 입력폼 (마우스를 올리면 보임, 물리 효과 제외) -->
    <div id="input-container">
        <input type="date" id="target-date">
        <button id="set-btn">SET</button>
    </div>

    <!-- DOM 요소들 (data-x, data-y로 초기 위치 지정) -->
    <div id="dday-display" class="physics-element" data-x="50%" data-y="35%">D-100</div>
    <div id="subtitle" class="physics-element" data-x="50%" data-y="55%">Until launch</div>
    
    <div class="physics-element pill" data-x="30%" data-y="65%">Travel</div>
    <div class="physics-element pill" data-x="28%" data-y="78%">Birthday</div>

    <!-- Matter.js 물리 엔진 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // ==========================================
        // 1. D-Day 계산 로직
        // ==========================================
        const targetDateInput = document.getElementById('target-date');
        const setBtn = document.getElementById('set-btn');
        const ddayDisplay = document.getElementById('dday-display');

        // 로컬 타임존 기준 100일 뒤의 날짜를 기본값으로 설정 (이미지의 D-100 매칭)
        const localDate = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000);
        localDate.setDate(localDate.getDate() + 100);
        const targetDateStr = localDate.toISOString().split('T')[0];
        targetDateInput.value = targetDateStr;

        function calculateDday() {
            const targetValue = targetDateInput.value;
            if (!targetValue) return;
            
            const targetDate = new Date(targetValue);
            targetDate.setHours(0, 0, 0, 0);
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 날짜 차이 계산
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 0) {
                ddayDisplay.textContent = `D-${diffDays}`;
            } else if (diffDays === 0) {
                ddayDisplay.textContent = `D-DAY`;
            } else {
                ddayDisplay.textContent = `D+${Math.abs(diffDays)}`;
            }

            // ⚠️ [중요] 텍스트 변경으로 인해 DOM 크기가 달라지면 물리 엔진 Body 크기도 동기화
            setTimeout(() => {
                updateBodySize(ddayDisplay);
            }, 10);
        }

        setBtn.addEventListener('click', calculateDday);
        targetDateInput.addEventListener('change', calculateDday);

        // ==========================================
        // 2. Matter.js 물리 엔진 설정 (Anti-gravity)
        // ==========================================
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events;

        const engine = Engine.create();
        
        // 💫 안티그래비티 느낌을 위해 중력을 아주 약하게 설정 (둥둥 떠다님)
        engine.world.gravity.y = 0.2;

        // 벽(Wall) 생성 함수
        let ground, leftWall, rightWall, ceiling;
        const wallOptions = { 
            isStatic: true, 
            restitution: 0.9, // 벽에 부딪혔을 때 튕기는 효과 극대화
            friction: 0 
        };

        function createWalls() {
            if (ground) Composite.remove(engine.world, [ground, leftWall, rightWall, ceiling]);
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            const t = 100; // 두께
            
            // 화면 바깥으로 요소가 나가지 않도록 사방에 보이지 않는 벽 생성
            ground = Bodies.rectangle(w / 2, h + t/2, w + 200, t, wallOptions);
            ceiling = Bodies.rectangle(w / 2, -t/2, w + 200, t, wallOptions);
            leftWall = Bodies.rectangle(-t/2, h / 2, t, h + 200, wallOptions);
            rightWall = Bodies.rectangle(w + t/2, h / 2, t, h + 200, wallOptions);
            
            Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);
        }
        createWalls();
        window.addEventListener('resize', createWalls); // 리사이즈 대응

        // DOM 요소와 물리 Body 매핑
        const domElements = document.querySelectorAll('.physics-element');
        const bodyMap = new Map();

        // % 단위를 px 픽셀 단위로 파싱하는 함수
        function parsePosition(value, max) {
            if (value.endsWith('%')) {
                return (parseFloat(value) / 100) * max;
            }
            return parseFloat(value);
        }

        // 각 DOM 요소에 대해 물리 Body 생성
        domElements.forEach(elem => {
            const x = parsePosition(elem.getAttribute('data-x'), window.innerWidth);
            const y = parsePosition(elem.getAttribute('data-y'), window.innerHeight);
            
            const rect = elem.getBoundingClientRect();
            
            const body = Bodies.rectangle(x, y, rect.width, rect.height, {
                restitution: 0.8,    // 튕김 정도
                friction: 0.1,       // 마찰력
                frictionAir: 0.02,   // 공기 저항 (낮을수록 더 잘 미끄러짐)
                density: 0.001
            });
            
            // 초기 회전값을 약간 랜덤하게 부여하여 자연스러움 추가
            Matter.Body.setAngle(body, (Math.random() - 0.5) * 0.2);
            
            bodyMap.set(elem, body);
            Composite.add(engine.world, body);
        });

        // 🔄 DOM 크기 변경 시 물리 Body 크기 동기화 함수
        function updateBodySize(elem) {
            const body = bodyMap.get(elem);
            if (!body) return;
            
            // 본래 크기를 측정하기 위해 transform 임시 해제
            const prevTransform = elem.style.transform;
            elem.style.transform = 'translate(0px, 0px)'; 
            const rect = elem.getBoundingClientRect();
            elem.style.transform = prevTransform;
            
            const currentWidth = body.bounds.max.x - body.bounds.min.x;
            const currentHeight = body.bounds.max.y - body.bounds.min.y;
            
            // 기존 대비 변경된 비율만큼 Body 스케일링
            Matter.Body.scale(body, rect.width / currentWidth, rect.height / currentHeight);
        }

        // 🎥 매 프레임마다 물리 Body 위치를 실제 DOM 요소의 CSS transform에 적용
        Events.on(engine, 'afterUpdate', () => {
            bodyMap.forEach((body, elem) => {
                // DOM의 기준점이 좌상단이므로, 중심점으로 보정
                const x = body.position.x - elem.offsetWidth / 2;
                const y = body.position.y - elem.offsetHeight / 2;
                const angle = body.angle;
                
                elem.style.transform = `translate(${x}px, ${y}px) rotate(${angle}rad)`;
            });
        });

        // 🖱️ 마우스 상호작용 (드래그)
        const mouse = Mouse.create(document.body);
        
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.1,
                render: { visible: false }
            }
        });
        Composite.add(engine.world, mouseConstraint);

        // 💥 배경 클릭 시 무중력 폭발 효과 (Google Space 효과)
        document.body.addEventListener('mousedown', (e) => {
            // UI 요소가 아닌 빈 배경을 클릭했을 때만 반응
            if (!e.target.closest('.physics-element')) {
                bodyMap.forEach(body => {
                    const forceMagnitude = 0.07 * body.mass;
                    // 위로 솟구치는 힘과 약간의 랜덤 수평 힘 적용
                    Matter.Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * forceMagnitude,
                        y: -forceMagnitude - (Math.random() * forceMagnitude) 
                    });
                    
                    // 팽이처럼 회전하는 힘 추가
                    Matter.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
                });
            }
        });

        // 엔진 실행 (60fps)
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 시작 시 오늘 날짜로 D-DAY 계산 1회 실행
        calculateDday();
    </script>
</body>
</html>
