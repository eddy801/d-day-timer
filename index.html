<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <title>Anti-gravity D-DAY 카운터</title>
    <meta name="description" content="미니멀하고 세련된 무중력 D-DAY 카운터입니다. 우주 공간처럼 둥둥 떠다니는 태그와 함께 당신만의 디데이를 설정해보세요.">
    <meta name="keywords" content="디데이, D-DAY, 카운터, 타이머, 무중력 타이머, 미니멀 디자인, dday timer">
    <meta name="author" content="VibeCoding">
    <link rel="canonical" href="https://d-day-timer.vercel.app/">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (카카오톡, 슬랙 등 공유 시 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://d-day-timer.vercel.app/">
    <meta property="og:title" content="Anti-gravity D-DAY 카운터">
    <meta property="og:description" content="우주 공간처럼 둥둥 떠다니는 태그와 함께 당신만의 디데이를 설정해보세요.">
    <meta property="og:site_name" content="D-DAY 카운터">
    <!-- 모던한 UI를 위한 폰트 로드 -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        /* 🚀 물리 엔진이 적용될 DOM 요소들의 공통 클래스 */
        .physics-element {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            will-change: transform;
            transform-origin: center center;
            user-select: none;
            cursor: grab;
        }
        
        .physics-element:active {
            cursor: grabbing;
        }

        /* 👑 중앙 상단 객체 등록 폼 (프리미엄 디자인) */
        #creator-form {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .premium-input {
            padding: 12px 18px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            outline: none;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
            color-scheme: dark;
        }

        .premium-input:focus {
            border-color: #00c6ff;
            box-shadow: 0 0 10px rgba(0, 198, 255, 0.2);
        }
        
        #input-text { width: 140px; }
        #input-date { width: 140px; cursor: pointer; }
        #input-importance { width: 100px; cursor: pointer; }

        .premium-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
        }

        .premium-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.6);
        }

        /* 🌟 동적 객체 (Pill) 기본 디자인 */
        .dday-pill {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            backdrop-filter: blur(8px);
            white-space: nowrap;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: none; /* 물리 연산을 방해하지 않도록 제거 */
        }
        
        .pill-title {
            color: #aaa;
            font-weight: 400;
        }

        .pill-dday {
            font-weight: 900;
        }

        /* 중요도(1~3)에 따른 크기 및 네온 컬러 매핑 */
        .importance-1 { padding: 12px 25px; font-size: 1rem; }
        .importance-1 .pill-dday { color: #fff; }
        
        .importance-2 { padding: 18px 35px; font-size: 1.6rem; }
        .importance-2 .pill-dday { color: #00ffcc; text-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        
        .importance-3 { padding: 30px 50px; font-size: 3rem; }
        .importance-3 .pill-dday { color: #ff3366; text-shadow: 0 0 25px rgba(255, 51, 102, 0.5); border-color: rgba(255,51,102,0.3); }

        /* 좌상단 고정 아이콘 */
        .top-nav {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }
        .top-nav svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 좌상단 고정 아이콘 -->
    <div class="top-nav">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>

    <!-- 중앙 상단 다중 객체 등록 폼 -->
    <form id="creator-form">
        <input type="text" id="input-text" class="premium-input" placeholder="내용 (예: 여행)" required autocomplete="off">
        <input type="date" id="input-date" class="premium-input" required>
        <select id="input-importance" class="premium-input">
            <option value="1">중요도: 하</option>
            <option value="2" selected>중요도: 중</option>
            <option value="3">중요도: 상</option>
        </select>
        <button type="submit" class="premium-btn">추가하기</button>
    </form>

    <!-- Matter.js 물리 엔진 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const Engine = Matter.Engine,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events;

        const engine = Engine.create();
        engine.world.gravity.y = 0.2; // 부드러운 중력

        let ground, leftWall, rightWall, ceiling;
        const wallOptions = { isStatic: true, restitution: 0.9, friction: 0 };

        function createWalls() {
            if (ground) Composite.remove(engine.world, [ground, leftWall, rightWall, ceiling]);
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            const t = 100;
            
            ground = Bodies.rectangle(w / 2, h + t/2, w + 200, t, wallOptions);
            ceiling = Bodies.rectangle(w / 2, -t/2, w + 200, t, wallOptions);
            leftWall = Bodies.rectangle(-t/2, h / 2, t, h + 200, wallOptions);
            rightWall = Bodies.rectangle(w + t/2, h / 2, t, h + 200, wallOptions);
            
            Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);
        }
        createWalls();
        window.addEventListener('resize', createWalls);

        // 맵: DOM 요소 -> 물리 Body
        const bodyMap = new Map();

        // 매 프레임 위치 동기화
        Events.on(engine, 'afterUpdate', () => {
            bodyMap.forEach((body, elem) => {
                const x = body.position.x - elem.offsetWidth / 2;
                const y = body.position.y - elem.offsetHeight / 2;
                const angle = body.angle;
                elem.style.transform = `translate(${x}px, ${y}px) rotate(${angle}rad)`;
            });
        });

        // 마우스 상호작용
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.1, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);

        // 배경 클릭 시 구글 스페이스(무중력) 폭발 효과
        document.body.addEventListener('mousedown', (e) => {
            if (!e.target.closest('.physics-element') && !e.target.closest('#creator-form')) {
                bodyMap.forEach(body => {
                    const forceMagnitude = 0.08 * body.mass;
                    Matter.Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * forceMagnitude,
                        y: -forceMagnitude - (Math.random() * forceMagnitude)
                    });
                    Matter.Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.3);
                });
            }
        });

        // 날짜 계산 로직
        function calculateDiffDays(targetDateStr) {
            const targetDate = new Date(targetDateStr);
            targetDate.setHours(0, 0, 0, 0);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return Math.ceil((targetDate - today) / (1000 * 60 * 60 * 24));
        }

        function formatDday(diffDays) {
            if (diffDays > 0) return `D-${diffDays}`;
            if (diffDays === 0) return `D-DAY`;
            return `D+${Math.abs(diffDays)}`;
        }

        // ⭐ 동적 객체 생성 로직
        function spawnDdayObject(text, targetDateStr, importance) {
            const diffDays = calculateDiffDays(targetDateStr);
            
            // 1. DOM 요소 생성
            const elem = document.createElement('div');
            elem.className = `physics-element dday-pill importance-${importance}`;
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'pill-title';
            titleSpan.textContent = text;
            
            const ddaySpan = document.createElement('span');
            ddaySpan.className = 'pill-dday';
            ddaySpan.textContent = formatDday(diffDays);
            
            elem.appendChild(titleSpan);
            elem.appendChild(ddaySpan);
            document.body.appendChild(elem);
            
            // 2. 물리 Body 생성 전 크기 측정
            const rect = elem.getBoundingClientRect();
            
            // 3. 생성 위치 (상단 폼 바로 아래쪽 중앙 부근)
            const spawnX = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
            const spawnY = 150;
            
            const body = Bodies.rectangle(spawnX, spawnY, rect.width, rect.height, {
                restitution: 0.8,
                friction: 0.1,
                frictionAir: 0.02,
                density: 0.001 * (parseInt(importance) * 2) // 중요도 높을수록 질량 약간 증가
            });
            
            // 약간 비스듬하게 떨어지도록 설정
            Matter.Body.setAngle(body, (Math.random() - 0.5) * 0.4);
            
            bodyMap.set(elem, body);
            Composite.add(engine.world, body);
        }

        // 폼 제출 이벤트
        const creatorForm = document.getElementById('creator-form');
        creatorForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = document.getElementById('input-text').value;
            const date = document.getElementById('input-date').value;
            const importance = document.getElementById('input-importance').value;
            
            spawnDdayObject(text, date, importance);
            
            document.getElementById('input-text').value = ''; // 텍스트만 초기화
        });

        // 초기 날짜 세팅 및 기본 예시 객체 떨어뜨리기
        const localDate = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000);
        localDate.setDate(localDate.getDate() + 100);
        document.getElementById('input-date').value = localDate.toISOString().split('T')[0];

        // 페이지 로드 시 시각적 즐거움을 위해 샘플 객체 연속 스폰
        setTimeout(() => spawnDdayObject('프로젝트 런칭', localDate.toISOString().split('T')[0], '3'), 300);
        
        const date2 = new Date(localDate); date2.setDate(date2.getDate() - 50);
        setTimeout(() => spawnDdayObject('베타 테스트', date2.toISOString().split('T')[0], '2'), 700);
        
        const date3 = new Date(localDate); date3.setDate(date3.getDate() - 80);
        setTimeout(() => spawnDdayObject('MVP 완료', date3.toISOString().split('T')[0], '1'), 1100);

        // 실행
        const runner = Runner.create();
        Runner.run(runner, engine);
    </script>
</body>
</html>
